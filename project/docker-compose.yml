services:
  postgres:
    image: postgres:16
    container_name: airparser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: airparser_db
      POSTGRES_USER: airparser_user
      POSTGRES_PASSWORD: airparser_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
